version: "3.9"
services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app:cached
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hygenix
      POSTGRES_USER: hygenix
      POSTGRES_PASSWORD: hygenix
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
